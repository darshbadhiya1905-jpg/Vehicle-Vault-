<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Vehicle Vault</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}

.hero {
  background: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7') center/cover no-repeat;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<section class="hero min-h-screen flex items-center justify-center">
  <div class="relative z-10 glass p-10 rounded-2xl w-full max-w-md">

    <h2 class="text-3xl font-bold mb-6 text-center">Welcome Back</h2>

    {% if messages %}
      {% for message in messages %}
        <p class="text-red-400 text-center mb-4">{{ message }}</p>
      {% endfor %}
    {% endif %}

    <form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Enter Username">
    <input type="password" name="password" placeholder="Enter Password">
    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>


  </div>
</section>

</body>
</html>
