{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Vehicle Vault - Sign Up</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background-image:url("{% static 'images/garage.jpg' %}");
    background-size:cover;
    background-position:center;
}

.signup-container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.signup-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

.signup-box h2{
    text-align:center;
    margin-bottom:30px;
}

.signup-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.signup-box button{
    width:100%;
    padding:12px;
    background:#111;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.signup-box button:hover{
    background:#444;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    color:#007bff;
}

</style>

</head>

<body>

<div class="signup-container">

<div class="signup-box">

<h2>Create Account</h2>

<form method="POST">
    {% csrf_token %}
    
    <input type="text" name="username" placeholder="Username" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    
    <button type="submit">Sign Up</button>
</form>

<p>
    Already have an account? 
    <a href="{% url 'login' %}">Login</a>
</p>

</div>

</div>

</div>

</body>
</html>
