{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Vehicle Vault</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
                        url("{% static 'images/car-bg.jpg' %}") no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(10, 10, 10, 0.98); /* darker */
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8); /* stronger shadow */
            backdrop-filter: blur(10px); /* glass effect */
        }

        .login-container h2 {
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: #111;
            color: white;
        }

        input:focus {
            outline: none;
            border: 1px solid #ff3c00;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 25px;
            background: #ff3c00;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff1e00;
        }

        .extra-links {
            margin-top: 18px;
            font-size: 14px;
            color: #bbb; /* softer white */
        }

        .extra-links a {
            color: #ff3c00;
            font-weight: 600;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        .brand {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

    </style>
</head>

<body>

<div class="brand">Vehicle Vault</div>

<div class="login-container">
    <h2>Welcome Back</h2>

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" class="btn">Login</button>
    </form>

    <div class="extra-links">
        <p>Don't have an account? <a href="/core/signup/">Sign up</a></p>
    </div>
</div>

</body>
</html>
